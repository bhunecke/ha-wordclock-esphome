substitutions:
  devicename: wordclock
  friendly_name: "Wordclock"

esp8266:
  board: nodemcuv2

esphome:
  name: ${devicename}
  on_boot:
    priority: 800
    then:
      - light.turn_on: 
          id: fastledlight

external_components:
  - source:
      type: local
      path: components

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  reboot_timeout: 0min
  ap:
    ssid: "${devicename}"
    password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.1.126
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: !secret api_secret
  reboot_timeout: 30min
  services:
    - service: setled
      variables:
        number: int
        red: int
        blue: int
        green: int
      then:
        - lambda: |-
            id(my_wordclock)->on_setled(number, red, blue, green);

ota:
  - platform: esphome
    password: !secret ota_secret

logger:
  esp8266_store_log_strings_in_flash: false

output:
  - platform: template
    id: output_r
    type: float
    write_action: []
  - platform: template
    id: output_g
    type: float
    write_action: []
  - platform: template
    id: output_b
    type: float
    write_action: []

light:
  - platform: rgb
    name: ${friendly_name}
    id: fastledlight
    red: output_r
    green: output_g
    blue: output_b

time:
  - platform: homeassistant
    id: current_time

wordclock:
  id: my_wordclock
  time_id: current_time
  light_id: fastledlight
