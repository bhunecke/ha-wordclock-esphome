substitutions:
  devicename: wordclock
  friendly_name: "Wordclock"

esphome:
  name: ${devicename}
  on_boot:
    priority: 800
    then:
      - light.turn_on: 
          id: fastledlight

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_secret
  reboot_timeout: 30min
  services:
    - service: setled
      variables:
        number: int
        red: int
        blue: int
        green: int
      then:
        - lambda: |-
            id(my_wordclock)->on_setled(number, red, blue, green);

ota:
  - platform: esphome
    password: !secret ota_secret

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  reboot_timeout: 0min

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${devicename}"
    password: !secret ap_password

captive_portal:

external_components:
  source: github://bhunecke/ha-wordclock-esphome@refactor/esphome-changes

output:
  - platform: template
    id: output_r
    type: float
    write_action: []
  - platform: template
    id: output_g
    type: float
    write_action: []
  - platform: template
    id: output_b
    type: float
    write_action: []

light:
  - platform: rgb
    name: ${friendly_name}
    id: fastledlight
    red: output_r
    green: output_g
    blue: output_b

time:
  - platform: homeassistant
    id: current_time

wordclock:
  id: my_wordclock
  time_id: current_time
  light_id: fastledlight
